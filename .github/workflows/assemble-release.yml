name: Assemble release payload

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  assemble:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'initial-setup'
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: initial-setup

      - name: Assemble release files
        shell: bash
        run: |
          cat .assembly/part-* > /tmp/relay-payload.b64
          base64 --decode /tmp/relay-payload.b64 > /tmp/relay-payload.tgz
          tar -xzf /tmp/relay-payload.tgz
          rm -rf .assembly
          rm .github/workflows/assemble-release.yml

      - name: Commit assembled files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Relay Console v1.8.2 application and GPL license"
          git push origin HEAD:initial-setup
